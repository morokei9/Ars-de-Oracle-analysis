<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cella Oraculum · 얼마나 모일까</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <script
    src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/chart.js@4.4.1/dist/chart.umd.min.js';document.head.appendChild(s);"
  ></script>
  <style>
    :root {
      --void: #060608;
      --text: #eceff4;
      --muted: #94a3b8;
      --panel: rgba(14, 14, 20, 0.86);

      --hue: 195;
      --accent: hsl(var(--hue), 95%, 62%);
      --accent-soft: hsla(var(--hue), 90%, 55%, 0.22);
      --accent-border: hsla(var(--hue), 90%, 55%, 0.32);
      --accent-border-strong: hsla(var(--hue), 95%, 60%, 0.5);
      --glow: 0 0 22px hsla(var(--hue), 95%, 55%, 0.42), 0 0 60px hsla(var(--hue), 95%, 55%, 0.18);
      --glow-strong: 0 0 28px hsla(var(--hue), 95%, 58%, 0.5), 0 0 72px hsla(var(--hue), 95%, 55%, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 120%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans KR", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, hsla(var(--hue), 85%, 45%, 0.28), transparent 55%),
        radial-gradient(ellipse 90% 60% at 100% 100%, hsla(var(--hue), 85%, 55%, 0.14), transparent 50%),
        radial-gradient(ellipse 70% 50% at 0% 80%, hsla(var(--hue), 85%, 60%, 0.10), transparent 45%),
        linear-gradient(165deg, #030304 0%, var(--void) 40%, #0a0a0f 100%);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
      mix-blend-mode: overlay;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 0.35rem;
      text-shadow: 0 0 24px hsla(var(--hue), 95%, 55%, 0.45), 0 0 8px hsla(var(--hue), 95%, 60%, 0.25);
    }

    header p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .control-card {
      background: var(--panel);
      border: 1px solid var(--accent-border);
      border-radius: 16px;
      padding: 1.5rem 1.65rem 1.65rem;
      margin-bottom: 2.25rem;
      box-shadow: var(--glow), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
    }

    .control-grid {
      display: grid;
      gap: 1.75rem;
    }

    @media (min-width: 720px) {
      .control-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1.75rem 0;
        align-items: start;
      }

      .field-col--left {
        padding-right: 1.5rem;
        border-right: 1px solid rgba(255, 255, 255, 0.14);
      }

      .field-col--right {
        padding-left: 1.5rem;
      }
    }

    @media (max-width: 719px) {
      .field-col--left {
        padding-bottom: 1.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .field label {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
    }

    .field .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: -0.2rem;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex-wrap: wrap;
    }

    input[type="range"] {
      flex: 1;
      min-width: 140px;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(90deg, hsla(var(--hue), 90%, 60%, 0.38), hsla(var(--hue), 85%, 40%, 0.12));
      border-radius: 8px;
      outline: none;
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.55);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, hsl(var(--hue), 100%, 92%), hsl(var(--hue), 95%, 62%) 55%, hsl(var(--hue), 90%, 45%));
      cursor: grab;
      box-shadow: var(--glow);
      border: 2px solid hsla(var(--hue), 100%, 88%, 0.35);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, hsl(var(--hue), 100%, 92%), hsl(var(--hue), 95%, 62%));
      cursor: grab;
      box-shadow: var(--glow);
      border: 2px solid hsla(var(--hue), 100%, 88%, 0.35);
    }

    .pill {
      font-variant-numeric: tabular-nums;
      font-size: 0.85rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      background: hsla(var(--hue), 90%, 55%, 0.12);
      color: hsl(var(--hue), 95%, 78%);
      border: 1px solid var(--accent-border);
      white-space: nowrap;
      text-shadow: 0 0 10px hsla(var(--hue), 95%, 60%, 0.35);
    }

    .input-with-suffix {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .input-with-suffix .num-input {
      flex: 1;
      min-width: 0;
    }

    .input-suffix {
      font-size: 0.95rem;
      color: var(--muted);
      white-space: nowrap;
      user-select: none;
    }

    .num-input {
      width: 100%;
      max-width: 240px;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(8, 8, 12, 0.9);
      color: var(--text);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 0 12px hsla(var(--hue), 90%, 55%, 0.14);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .num-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 18px hsla(var(--hue), 95%, 60%, 0.4);
    }

    .summary {
      margin-top: 0;
      margin-bottom: 1.75rem;
      padding: 0.85rem 1.05rem;
      border-radius: 12px;
      background: hsla(var(--hue), 85%, 45%, 0.08);
      border: 1px solid hsla(var(--hue), 90%, 55%, 0.25);
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .summary strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-amount-gap {
      display: inline-block;
      width: 1em;
    }

    .chart-card {
      background: rgba(12, 12, 16, 0.92);
      border: 1px solid var(--accent-border);
      border-radius: 16px;
      padding: 1.15rem 0.85rem 1.35rem;
      margin-top: 0.35rem;
      box-shadow: var(--glow-strong), inset 0 0 80px rgba(0, 0, 0, 0.55);
      position: relative;
      overflow: hidden;
    }

    @media (prefers-reduced-motion: reduce) {
      .control-card,
      .chart-card,
      header h1 {
        animation: none !important;
      }
      * {
        transition-duration: 0.001ms !important;
        animation-duration: 0.001ms !important;
      }
    }

    .chart-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 16px;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, hsla(var(--hue), 90%, 55%, 0.08), transparent 60%);
    }

    .chart-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: flex-start;
      gap: 0.5rem;
      padding: 0 0.75rem 0.5rem;
      position: relative;
      z-index: 1;
    }

    .chart-head h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
    }

    .chart-wrap {
      position: relative;
      height: min(52vh, 420px);
      z-index: 1;
    }

    @media (max-width: 600px) {
      .chart-wrap {
        height: 380px;
      }
    }

    .chart-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0.4rem 0.75rem 0.65rem;
      position: relative;
      z-index: 1;
    }

    .btn-table {
      padding: 0.45rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--accent-border);
      background: hsla(var(--hue), 85%, 42%, 0.35);
      color: hsl(var(--hue), 95%, 92%);
      font: inherit;
      font-size: 0.86rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--glow);
      transition: transform 0.12s ease, filter 0.15s ease;
    }

    .btn-table:hover {
      filter: brightness(1.08);
    }

    .btn-table:active {
      transform: scale(0.98);
    }

    .table-section {
      margin-top: 1.5rem;
      padding: 1rem 1.1rem 1.15rem;
      border-radius: 14px;
      border: 1px solid var(--accent-border);
      background: rgba(10, 10, 14, 0.88);
      box-shadow: var(--glow);
    }

    .table-section h3 {
      margin: 0 0 0.45rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .table-hint {
      margin: 0 0 0.65rem;
      font-size: 0.76rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .table-scroll {
      overflow: auto;
      max-height: min(55vh, 420px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
      user-select: text;
      -webkit-user-select: text;
    }

    .data-table th,
    .data-table td {
      padding: 0.4rem 0.55rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      text-align: right;
      white-space: nowrap;
    }

    .data-table th:first-child,
    .data-table td:first-child {
      text-align: center;
    }

    .data-table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(18, 18, 24, 0.97);
      color: hsl(var(--hue), 95%, 78%);
      font-weight: 600;
    }

    .data-table tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.03);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 lang="la">Cella Oraculum</h1>
      <p>얼마나 모일까</p>
    </header>

    <section class="control-card" aria-label="매달 넣는 돈과 기간">
      <div class="summary" id="summary" aria-live="polite"></div>
      <div class="control-grid">
        <div class="field field-col field-col--left">
          <label for="paySlider">매달 넣는 돈</label>
          <div class="slider-row">
            <input type="range" id="paySlider" min="5" max="50" step="5" value="30" />
            <span class="pill" id="paySliderLabel">30만원</span>
          </div>
          <label for="payInput" class="hint">아래 칸에 직접 입력 가능</label>
          <div class="input-with-suffix">
            <input class="num-input" type="text" id="payInput" inputmode="decimal" autocomplete="off" placeholder="30만, 1억 …" />
            <span class="input-suffix">원</span>
          </div>
        </div>
        <div class="field field-col field-col--right">
          <label for="monthSlider">몇 개월 홀딩</label>
          <div class="slider-row">
            <input type="range" id="monthSlider" min="0" max="48" step="1" value="24" />
            <span class="pill" id="monthLabel">24개월</span>
          </div>
          <label for="monthInput" class="hint">아래 칸에 직접 입력 가능</label>
          <div class="input-with-suffix">
            <input class="num-input" type="text" id="monthInput" inputmode="numeric" autocomplete="off" placeholder="0~60" value="24" />
            <span class="input-suffix">개월</span>
          </div>
        </div>
      </div>
    </section>

    <section class="chart-card" aria-label="돈 그래프">
      <div class="chart-head">
        <h2>돈</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <div class="chart-footer">
        <button type="button" class="btn-table" id="btnGenerateTable">표 생성</button>
      </div>
    </section>

    <section class="table-section" id="tableSection" hidden aria-labelledby="tableHeading">
      <h3 id="tableHeading">돈</h3>
      <p class="table-hint">
        칸을 드래그해 고른 뒤 <kbd>Ctrl</kbd>+<kbd>C</kbd>로 복사하면 Excel 등에 붙일 수 있습니다.
      </p>
      <div class="table-scroll">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th scope="col">몇 달째</th>
              <th scope="col">원</th>
              <th scope="col">모인 돈</th>
            </tr>
          </thead>
          <tbody id="dataTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const MONTHLY_RATE = 0.3;
    const WON_PER_MAN = 10000;
    const MONTH_MAX_SLIDER = 48;
    const MONTH_MAX_INPUT = 60;

    const paySlider = document.getElementById("paySlider");
    const payInput = document.getElementById("payInput");
    const paySliderLabel = document.getElementById("paySliderLabel");
    const monthSlider = document.getElementById("monthSlider");
    const monthInput = document.getElementById("monthInput");
    const monthLabel = document.getElementById("monthLabel");
    const summaryEl = document.getElementById("summary");
    const btnGenerateTable = document.getElementById("btnGenerateTable");
    const tableSection = document.getElementById("tableSection");
    const dataTableBody = document.getElementById("dataTableBody");

    function parsePayWon(raw) {
      if (raw == null) return NaN;
      let s = String(raw).trim().replace(/,/g, "").replace(/\s+/g, "");
      if (!s) return NaN;
      s = s.replace(/원$/, "");

      let rest = s;
      let won = 0;
      let matched = false;

      const joMatch = rest.match(/^(\d+(?:\.\d+)?)조/);
      if (joMatch) {
        won += parseFloat(joMatch[1]) * 1e12;
        rest = rest.slice(joMatch[0].length);
        matched = true;
      }
      const eokMatch = rest.match(/^(\d+(?:\.\d+)?)억/);
      if (eokMatch) {
        won += parseFloat(eokMatch[1]) * 1e8;
        rest = rest.slice(eokMatch[0].length);
        matched = true;
      }
      const manMatch = rest.match(/^(\d+(?:\.\d+)?)만/);
      if (manMatch) {
        won += parseFloat(manMatch[1]) * 1e4;
        rest = rest.slice(manMatch[0].length);
        matched = true;
      }
      if (rest.length > 0) {
        const n = parseFloat(rest);
        if (Number.isFinite(n)) {
          won += n;
          matched = true;
        } else if (!matched) {
          return NaN;
        }
      }
      return matched ? Math.round(won) : NaN;
    }

    function formatWon(won) {
      if (!Number.isFinite(won)) return "—";
      const r = Math.round(won);
      if (r === 0) return "0원";
      const sign = r < 0 ? "-" : "";
      let abs = Math.abs(r);
      const jo = Math.floor(abs / 1e12);
      const eok = Math.floor((abs % 1e12) / 1e8);
      const man = Math.floor((abs % 1e8) / 1e4);
      const rest = abs % 1e4;
      const parts = [];
      if (jo > 0) parts.push(jo.toLocaleString("ko-KR") + "조");
      if (eok > 0) parts.push(eok.toLocaleString("ko-KR") + "억");
      if (man > 0) parts.push(man.toLocaleString("ko-KR") + "만");
      if (rest > 0) parts.push(rest.toLocaleString("ko-KR"));
      return sign + parts.join(" ") + "원";
    }

    function formatCompact(won) {
      if (!Number.isFinite(won)) return "—";
      const r = Math.round(won);
      if (r === 0) return "0";
      const sign = r < 0 ? "-" : "";
      const abs = Math.abs(r);
      if (abs >= 1e12) {
        const jo = abs / 1e12;
        const num = jo >= 100
          ? Math.round(jo).toLocaleString("ko-KR")
          : jo.toLocaleString("ko-KR", { maximumFractionDigits: 1 });
        return sign + num + "조";
      }
      if (abs >= 1e8) {
        const eok = Math.floor(abs / 1e8);
        const man = Math.floor((abs % 1e8) / 1e4);
        if (eok >= 1000 || man === 0) {
          return sign + eok.toLocaleString("ko-KR") + "억";
        }
        return sign + eok.toLocaleString("ko-KR") + "억 " + man.toLocaleString("ko-KR") + "만";
      }
      if (abs >= 1e4) {
        return sign + Math.floor(abs / 1e4).toLocaleString("ko-KR") + "만";
      }
      return sign + abs.toLocaleString("ko-KR") + "원";
    }

    function getMonthlyPaymentWon() {
      const fromInput = parsePayWon(payInput.value);
      if (Number.isFinite(fromInput) && fromInput >= 0) return fromInput;
      const v = parseInt(paySlider.value, 10) * 10000;
      return v;
    }

    function syncPaySliderFromWon(won) {
      if (!Number.isFinite(won) || won < 0) return;
      const man = won / 10000;
      if (man >= 5 && man <= 50 && Math.abs(man - Math.round(man)) < 1e-6 && Math.round(man) % 5 === 0) {
        paySlider.value = String(Math.round(man));
      }
    }

    function updatePayPill(won) {
      if (!Number.isFinite(won) || won < 0) {
        paySliderLabel.textContent = "—";
        return;
      }
      paySliderLabel.textContent = formatCompact(won);
    }

    function buildSeries(months, monthlyWon) {
      const labels = [];
      const valuesMan = [];
      let balance = 0;
      for (let m = 0; m <= months; m++) {
        labels.push(m + "개월");
        valuesMan.push(balance / WON_PER_MAN);
        if (m < months) {
          balance = balance * (1 + MONTHLY_RATE) + monthlyWon;
        }
      }
      return { labels, valuesMan, finalWon: balance };
    }

    function getCurrentMonths() {
      const v = parseInt(String(monthInput.value).trim(), 10);
      if (!Number.isFinite(v)) return 24;
      return Math.max(0, Math.min(MONTH_MAX_INPUT, v));
    }

    function getMonthlyPaymentWonNormalized() {
      let monthlyWon = getMonthlyPaymentWon();
      if (!Number.isFinite(monthlyWon) || monthlyWon < 0) monthlyWon = 300000;
      return monthlyWon;
    }

    function syncMonthSliderToMonths(months) {
      const thumb = Math.min(months, MONTH_MAX_SLIDER);
      monthSlider.value = String(thumb);
    }

    function renderDataTable() {
      const months = getCurrentMonths();
      const monthlyWon = getMonthlyPaymentWonNormalized();
      const { valuesMan } = buildSeries(months, monthlyWon);

      dataTableBody.textContent = "";
      const frag = document.createDocumentFragment();
      for (let m = 0; m <= months; m++) {
        const won = Math.round(valuesMan[m] * WON_PER_MAN);
        const tr = document.createElement("tr");
        const td0 = document.createElement("td");
        td0.textContent = String(m);
        const td1 = document.createElement("td");
        td1.textContent = String(won);
        const td2 = document.createElement("td");
        td2.textContent = formatWon(won);
        tr.appendChild(td0);
        tr.appendChild(td1);
        tr.appendChild(td2);
        frag.appendChild(tr);
      }
      dataTableBody.appendChild(frag);
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    let chart;

    let currentHueValue = 195;

    function createGradient(chartArea) {
      const h = currentHueValue;
      const g = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
      g.addColorStop(0, `hsla(${h}, 90%, 55%, 0.03)`);
      g.addColorStop(0.55, `hsla(${h}, 90%, 55%, 0.14)`);
      g.addColorStop(1, `hsla(${h}, 95%, 62%, 0.32)`);
      return g;
    }

    function appendStrong(parent, text) {
      const el = document.createElement("strong");
      el.textContent = text;
      parent.appendChild(el);
    }

    function updateSummary(months, monthlyWon, finalWon) {
      summaryEl.textContent = "";
      const f = document.createDocumentFragment();
      f.appendChild(document.createTextNode("매달 "));
      appendStrong(f, formatWon(monthlyWon));
      f.appendChild(document.createTextNode(" 넣고, 한 달에 30%씩 늘어난다고 치면 → "));
      appendStrong(f, months + "개월");
      f.appendChild(document.createTextNode(" 뒤 모인 돈은 :"));
      const gap = document.createElement("span");
      gap.className = "summary-amount-gap";
      gap.setAttribute("aria-hidden", "true");
      f.appendChild(gap);
      appendStrong(f, formatWon(finalWon));
      f.appendChild(document.createTextNode(" (≈ "));
      appendStrong(f, formatCompact(finalWon));
      f.appendChild(document.createTextNode(")"));
      summaryEl.appendChild(f);
    }

    const gradientFillPlugin = {
      id: "gradientFill",
      beforeDraw(chart) {
        const area = chart.chartArea;
        if (!area || area.width <= 0) return;
        const ds = chart.data.datasets[0];
        ds.backgroundColor = createGradient(area);
      },
    };

    const pointLabelPlugin = {
      id: "pointLabels",
      afterDatasetsDraw(chart) {
        const ds = chart.data.datasets[0];
        const meta = chart.getDatasetMeta(0);
        const { ctx } = chart;
        const n = meta.data.length;
        const totalMonths = Math.max(0, n - 1);

        let step;
        if (totalMonths <= 18) step = 1;
        else if (totalMonths <= 30) step = 2;
        else if (totalMonths <= 40) step = 3;
        else if (totalMonths <= 48) step = 4;
        else if (totalMonths <= 55) step = 5;
        else step = 6;

        const fs = totalMonths > 48 ? 12 : totalMonths > 30 ? 13 : totalMonths > 18 ? 13.5 : 14;

        ctx.save();
        ctx.font = fs + "px 'IBM Plex Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";

        meta.data.forEach((el, i) => {
          const isFirst = i === 0;
          const isLast = i === n - 1;
          if (!isFirst && !isLast && i % step !== 0) return;

          const yMan = ds.data[i];
          const won = Math.round(yMan * WON_PER_MAN);
          const txt = "(" + i + "개월, " + formatCompact(won) + ")";
          const { x, y } = el.getProps(["x", "y"], true);
          const stagger = step === 1 ? 0 : (i % 2) * 12;

          ctx.shadowColor = `hsla(${currentHueValue}, 95%, 60%, 0.9)`;
          ctx.shadowBlur = 10;
          ctx.fillStyle = "rgba(248, 250, 252, 0.97)";
          ctx.fillText(txt, x, y - 12 - stagger);
          ctx.shadowBlur = 0;
        });
        ctx.restore();
      },
    };

    const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (typeof Chart !== "undefined") {
      Chart.defaults.font.family = "'IBM Plex Sans KR', system-ui, sans-serif";
      Chart.defaults.font.size = 14;
    }

    function initChart() {
      chart = new Chart(ctx, {
        type: "line",
        plugins: [gradientFillPlugin, pointLabelPlugin],
        data: {
          labels: [],
          datasets: [
            {
              label: "돈",
              data: [],
              borderColor: `hsl(${currentHueValue}, 95%, 68%)`,
              backgroundColor: "rgba(255, 255, 255, 0.04)",
              borderWidth: 3,
              borderJoinStyle: "round",
              tension: 0.25,
              fill: true,
              pointRadius: (ctx) => {
                const c = ctx.chart.data.labels ? ctx.chart.data.labels.length : 0;
                return c > 36 ? 3 : 4;
              },
              pointBackgroundColor: `hsl(${currentHueValue}, 100%, 92%)`,
              pointBorderColor: `hsl(${currentHueValue}, 95%, 55%)`,
              pointBorderWidth: 2,
              pointHoverRadius: 7,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: {
            padding: { top: 48, left: 6, right: 10, bottom: 28 },
          },
          animation: reduceMotion ? false : {
            duration: 650,
            easing: "easeOutQuart",
          },
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: "rgba(12, 12, 18, 0.95)",
              titleColor: "#eceff4",
              bodyColor: "#94a3b8",
              borderColor: `hsla(${currentHueValue}, 95%, 55%, 0.5)`,
              borderWidth: 1,
              padding: 14,
              titleFont: { size: 14, family: "'IBM Plex Sans KR', system-ui, sans-serif" },
              bodyFont: { size: 14, family: "'IBM Plex Sans KR', system-ui, sans-serif" },
              callbacks: {
                title(items) {
                  const i = items[0].dataIndex;
                  const w = items[0].parsed.y * WON_PER_MAN;
                  return "(" + i + "개월, " + formatCompact(w) + ")";
                },
                label(item) {
                  const w = item.parsed.y * WON_PER_MAN;
                  return " " + formatWon(Math.round(w));
                },
              },
            },
          },
          scales: {
            x: {
              grid: { color: "rgba(255,255,255,0.06)" },
              ticks: {
                color: "#94a3b8",
                maxRotation: 45,
                minRotation: 0,
                autoSkip: true,
                maxTicksLimit: 18,
                font: { size: 13 },
              },
              title: {
                display: true,
                text: "시간 ( 개월 )",
                color: `hsl(${currentHueValue}, 95%, 72%)`,
                font: { size: 13, family: "'IBM Plex Sans KR', system-ui, sans-serif" },
              },
            },
            y: {
              position: "right",
              grid: { color: "rgba(255,255,255,0.06)" },
              ticks: {
                color: "#94a3b8",
                maxTicksLimit: 8,
                font: { size: 13 },
                callback(value) {
                  const v = Number(value);
                  if (!Number.isFinite(v)) return "";
                  return formatCompact(v * WON_PER_MAN);
                },
              },
              title: {
                display: true,
                text: "돈 ( 원 )",
                color: `hsl(${currentHueValue}, 95%, 72%)`,
                font: { size: 13, family: "'IBM Plex Sans KR', system-ui, sans-serif" },
              },
            },
          },
        },
      });
    }

    function redraw() {
      const months = getCurrentMonths();
      const monthlyWon = getMonthlyPaymentWonNormalized();

      const { labels, valuesMan, finalWon } = buildSeries(months, monthlyWon);

      chart.data.labels = labels;
      chart.data.datasets[0].data = valuesMan;

      chart.update();
      updatePayPill(monthlyWon);
      updateSummary(months, monthlyWon, finalWon);
    }

    function debounce(fn, ms) {
      let t;
      return function () {
        const args = arguments;
        const ctx = this;
        clearTimeout(t);
        t = setTimeout(() => fn.apply(ctx, args), ms);
      };
    }

    const redrawSoon = debounce(redraw, 120);

    paySlider.addEventListener("input", () => {
      const man = parseInt(paySlider.value, 10);
      payInput.value = String(man * 10000);
      updatePayPill(man * 10000);
      redraw();
    });

    function onPayInputLive() {
      const w = parsePayWon(payInput.value);
      if (Number.isFinite(w) && w >= 0) {
        syncPaySliderFromWon(w);
        updatePayPill(w);
      }
      redrawSoon();
    }

    payInput.addEventListener("input", onPayInputLive);
    payInput.addEventListener("change", () => {
      const w = parsePayWon(payInput.value);
      if (Number.isFinite(w) && w >= 0) {
        syncPaySliderFromWon(w);
        updatePayPill(w);
      }
      redraw();
    });

    monthSlider.addEventListener("input", () => {
      const v = parseInt(monthSlider.value, 10);
      monthInput.value = String(v);
      monthLabel.textContent = v + "개월";
      redraw();
    });

    monthInput.addEventListener("input", () => {
      const raw = String(monthInput.value).trim();
      if (raw === "") return;
      let v = parseInt(raw, 10);
      if (!Number.isFinite(v)) return;
      v = Math.max(0, Math.min(MONTH_MAX_INPUT, v));
      if (String(v) !== raw) {
        monthInput.value = String(v);
      }
      syncMonthSliderToMonths(v);
      monthLabel.textContent = v + "개월";
      redraw();
    });

    monthInput.addEventListener("blur", () => {
      const raw = String(monthInput.value).trim();
      if (raw === "") {
        monthInput.value = "24";
        syncMonthSliderToMonths(24);
        monthLabel.textContent = "24개월";
        redraw();
      }
    });

    btnGenerateTable.addEventListener("click", () => {
      renderDataTable();
      tableSection.hidden = false;
      tableSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
    });

    initChart();

    payInput.value = "300000";
    monthInput.value = "24";
    monthSlider.value = "24";
    monthLabel.textContent = "24개월";
    paySlider.value = "30";
    paySliderLabel.textContent = formatCompact(300000);

    redraw();

    // --- LED-like slow hue cycle (single-family at a time) ---
    // 195 = cyan, 215 = azure, 260 = violet, 320 = rose, 10 = ember, back to 195
    const HUE_KEYFRAMES = [195, 215, 260, 320, 10, 195];
    const CYCLE_MS = 60000;

    function lerpHue(a, b, k) {
      let diff = b - a;
      if (diff > 180) a += 360;
      else if (diff < -180) b += 360;
      return ((a + (b - a) * k) % 360 + 360) % 360;
    }

    function hueAt(ts) {
      const segs = HUE_KEYFRAMES.length - 1;
      const t = ((ts % CYCLE_MS) / CYCLE_MS) * segs;
      const i = Math.min(segs - 1, Math.floor(t));
      return lerpHue(HUE_KEYFRAMES[i], HUE_KEYFRAMES[i + 1], t - i);
    }

    function applyHue(h) {
      currentHueValue = h;
      document.documentElement.style.setProperty("--hue", h.toFixed(1));
      if (chart && chart.data.datasets[0]) {
        const ds = chart.data.datasets[0];
        ds.borderColor = `hsl(${h}, 95%, 68%)`;
        ds.pointBackgroundColor = `hsl(${h}, 100%, 92%)`;
        ds.pointBorderColor = `hsl(${h}, 95%, 55%)`;
        if (chart.options.plugins && chart.options.plugins.tooltip) {
          chart.options.plugins.tooltip.borderColor = `hsla(${h}, 95%, 55%, 0.5)`;
        }
        if (chart.options.scales && chart.options.scales.y && chart.options.scales.y.title) {
          chart.options.scales.y.title.color = `hsl(${h}, 95%, 72%)`;
        }
        if (chart.options.scales && chart.options.scales.x && chart.options.scales.x.title) {
          chart.options.scales.x.title.color = `hsl(${h}, 95%, 72%)`;
        }
        chart.update("none");
      }
    }

    if (!reduceMotion) {
      let lastTs = 0;
      const step = (ts) => {
        if (ts - lastTs > 90) {
          lastTs = ts;
          applyHue(hueAt(ts));
        }
        requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    } else {
      applyHue(195);
    }
  </script>
</body>
</html>
